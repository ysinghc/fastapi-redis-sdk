site_name: FastAPI Redis
site_description: Official FastAPI integration for Redis
site_author: Redis
site_url: https://redis.github.io/fastapi-redis-sdk

repo_name: redis/fastapi-redis-sdk
repo_url: https://github.com/redis/fastapi-redis-sdk
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  logo: logo.svg
  favicon: logo.svg
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      fallback_to_build_date: true
      strict: false
      exclude:
        - specs/*

exclude_docs: |
  README.md
  specs/

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - User Guide:
    - Architecture: guide/architecture.md
    - Caching: guide/caching.md
    - Configuration: guide/configuration.md
    - Benchmarks: guide/benchmarks.md
  - API Reference:
    - API Reference: api/reference.md
    - Configuration: api/configuration.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/redis/fastapi-redis-sdk
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

