name: Release to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'pypi'
        type: choice
        options:
        - pypi
        - testpypi
      dry_run:
        description: 'Dry run (build only, do not publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@v2
      with:
        egress-policy: audit

    - name: Checkout the project
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"
        enable-cache: false

    - name: Set up Python
      run: uv python install 3.12

  security-scan:
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@v2
      with:
        egress-policy: audit

    - name: Checkout the project
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"
        enable-cache: false

    - name: Set Python up and add dependencies
      run: |
        uv python install 3.12
        uv sync --all-extras --dev
        uv add --dev bandit

    - name: Run security scan with bandit
      run: |
        uv run bandit -r src/

  test:
    runs-on: ubuntu-latest
    needs: validate-release
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@v2
      with:
        egress-policy: audit

    - name: Checkout the project
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"
        enable-cache: false

    - name: Set up Python ${{ matrix.python-version }}
      run: |
        uv python install ${{ matrix.python-version }}
        uv sync --all-extras --dev

    - name: Run tests
      run: uv run pytest tests/ -v --tb=short
      env:
        REDIS_HOST: localhost
        REDIS_PORT: 6379

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [validate-release, security-scan, test]
    environment:
      name: ${{ github.event.inputs.environment || 'pypi' }}
      url: ${{ github.event.inputs.environment == 'testpypi' && 'https://test.pypi.org/p/fastapi-redis-sdk' || 'https://pypi.org/p/fastapi-redis-sdk' }}
    permissions:
      id-token: write
      contents: read
      attestations: write

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@v2
      with:
        egress-policy: audit

    - name: Checkout the project
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"
        enable-cache: false

    - name: Set up Python
      run: uv python install 3.12

    - name: Override version in pyproject.toml
      if: (github.event_name == 'workflow_dispatch' && github.event.inputs.version) || github.event_name == 'release'
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          TARGET_VERSION="${{ github.event.inputs.version }}"
          echo "Overriding version from manual trigger: $TARGET_VERSION"
        elif [[ "${{ github.event_name }}" == "release" ]]; then
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          TARGET_VERSION=$(echo "$RELEASE_TAG" | sed 's/^v//')
          echo "Overriding version from release tag: $TARGET_VERSION (tag: $RELEASE_TAG)"
        fi

        CURRENT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "Current version in pyproject.toml: $CURRENT_VERSION"

        if [[ "$CURRENT_VERSION" == "$TARGET_VERSION" ]]; then
          echo "Version already matches target: $TARGET_VERSION"
        else
          echo "Version override needed: $CURRENT_VERSION → $TARGET_VERSION"
          sed -i "s/^version = \".*\"/version = \"$TARGET_VERSION\"/" pyproject.toml
          NEW_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Updated version in pyproject.toml: $NEW_VERSION"
          if [[ "$NEW_VERSION" != "$TARGET_VERSION" ]]; then
            echo "Version override failed! Expected: $TARGET_VERSION, Got: $NEW_VERSION"
            exit 1
          fi
          echo "Version successfully changed: $CURRENT_VERSION → $NEW_VERSION"
        fi

    - name: Build package
      run: |
        uv build --sdist --wheel

    - name: Check package
      run: |
        uv add --dev twine
        uv run twine check dist/*

    - name: Generate build attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: 'dist/*'

    - name: Publish to PyPI
      if: ${{ !inputs.dry_run }}
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: ${{ github.event.inputs.environment == 'testpypi' && 'https://test.pypi.org/legacy/' || '' }}
        print-hash: true
        attestations: true

    - name: Dry run - Package ready for publishing
      if: ${{ inputs.dry_run }}
      run: |
        echo "DRY RUN MODE - Package built successfully but not published"
        echo "Built packages:"
        ls -la dist/
        echo ""
        echo "Package is ready for publishing to ${{ github.event.inputs.environment || 'pypi' }}"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: dist-files
        path: dist/
        retention-days: 90

  notify-success:
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: ${{ always() && !cancelled() && needs.build-and-publish.result == 'success' }}
    steps:
    - name: Success notification
      run: |
        if [[ "${{ inputs.dry_run }}" == "true" ]]; then
          echo "DRY RUN COMPLETED - fastapi-redis-sdk ready for release!"
          echo "Package built successfully but not published"
        else
          echo "Successfully released fastapi-redis-sdk!"
          echo ""
          echo "PyPI Package:"
          if [[ "${{ github.event.inputs.environment }}" == "testpypi" ]]; then
            echo "  https://test.pypi.org/project/fastapi-redis-sdk/"
          else
            echo "  https://pypi.org/project/fastapi-redis-sdk/"
          fi
        fi

